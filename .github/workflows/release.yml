name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-portable:
    name: Windows Portable
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci

      - name: Prepare Windows build tools
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja --yes --no-progress
          }

          cmake --version
          ninja --version

      - name: Build Windows native helpers
        run: npm run build:native:win

      - name: Build renderer and Electron entrypoints
        run: npm run build-vite

      - name: Package Windows installer and portable zip
        env:
          DEBUG: electron-builder
        run: npx electron-builder --win nsis zip --x64 --config.npmRebuild=false --publish never

      - name: Verify packaged FFmpeg
        run: npm run verify:ffmpeg:win

      - name: Verify Windows portable zip
        run: npm run verify:win:portable

      - name: Verify Windows installer
        shell: pwsh
        run: |
          $package = Get-Content "package.json" | ConvertFrom-Json
          $releaseDir = Join-Path "release" $package.version
          $installer = Get-ChildItem -Path $releaseDir -Filter "*.exe" -File | Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer exe was not found under $releaseDir"
          }
          if ($installer.Length -le 0) {
            throw "Windows installer exe is empty: $($installer.FullName)"
          }

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-release
          path: |
            release/*/*.zip
            release/*/*.exe
          if-no-files-found: error

      - name: Upload failed build diagnostics
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: windows-release-diagnostics-${{ github.run_id }}
          path: |
            electron/native/wgc-capture/build/**
            electron/native/bin/**
            electron/ffmpeg-runtime/**
            release/**
          if-no-files-found: ignore

  macos-arm64:
    name: macOS ARM64
    runs-on: macos-15
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      OPENSCREEN_MAC_HELPER_ARCHS: arm64
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci

      - name: Build macOS native helpers
        run: npm run build:native:mac

      - name: Build renderer and Electron entrypoints
        run: npm run build-vite

      - name: Package macOS DMG
        env:
          DEBUG: electron-builder,electron-osx-sign
        run: npx electron-builder --mac dmg --arm64 --config.npmRebuild=false --publish never

      - name: Verify packaged FFmpeg
        run: npm run verify:ffmpeg:mac:arm64

      - name: Upload macOS release artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos-release
          path: release/**/*.dmg
          if-no-files-found: error

      - name: Upload failed build diagnostics
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: macos-release-diagnostics-${{ github.run_id }}
          path: |
            electron/native/screencapturekit/build/**
            electron/native/bin/**
            electron/ffmpeg-runtime/**
            release/**
          if-no-files-found: ignore

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows-portable
      - macos-arm64
    steps:
      - uses: actions/checkout@v5

      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          mapfile -t assets < <(find release-artifacts -type f \( -name '*.zip' -o -name '*.exe' -o -name '*.dmg' \) | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          title="FreeRecording ${version}"
          notes="First FreeRecording release. Includes Windows x64 installer, Windows x64 portable, and macOS arm64 DMG builds."

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" --title "${title}" --notes "${notes}"
          else
            gh release create "${TAG_NAME}" --title "${title}" --notes "${notes}"
          fi

          gh release upload "${TAG_NAME}" "${assets[@]}" --clobber
