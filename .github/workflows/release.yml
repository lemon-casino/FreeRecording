name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-portable:
    name: Windows Portable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci

      - name: Prepare Windows build tools
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja --yes --no-progress
          }

          cmake --version
          ninja --version

      - name: Build Windows native helpers
        run: npm run build:native:win

      - name: Build renderer and Electron entrypoints
        run: npm run build-vite

      - name: Package Windows portable zip
        run: npx electron-builder --win zip --x64 --config.npmRebuild=false

      - name: Verify packaged FFmpeg
        run: npm run verify:ffmpeg:win

      - name: Verify Windows portable zip
        run: npm run verify:win:portable

      - name: Upload failed build diagnostics
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: windows-release-diagnostics-${{ github.run_id }}
          path: |
            electron/native/wgc-capture/build/**
            electron/native/bin/**
            electron/ffmpeg-runtime/**
            release/**
          if-no-files-found: ignore

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $package = Get-Content "package.json" | ConvertFrom-Json
          $releaseDir = Join-Path "release" $package.version
          $zip = Get-ChildItem -Path $releaseDir -Filter "*.zip" | Select-Object -First 1
          if (-not $zip) {
            throw "Windows portable zip was not found under $releaseDir"
          }

          $title = "FreeRecording $($package.version)"
          $notes = "First FreeRecording release. Windows x64 portable build."

          gh release view $env:TAG_NAME *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $env:TAG_NAME --title $title --notes $notes
            gh release upload $env:TAG_NAME $zip.FullName --clobber
          } else {
            gh release create $env:TAG_NAME $zip.FullName --title $title --notes $notes
          }
